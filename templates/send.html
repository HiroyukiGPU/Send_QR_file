<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信 — QR ファイル転送</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    max-width: 600px;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  header a { color: #666; text-decoration: none; font-size: 0.9rem; }
  header a:hover { color: #aaa; }
  h1 { font-size: 1.3rem; font-weight: 600; }

  main {
    width: 100%;
    max-width: 560px;
    padding: 0 1.5rem 3rem;
    flex: 1;
  }

  /* ─── Drop zone ─── */
  #drop-zone {
    border: 2px dashed #333;
    border-radius: 16px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1.5rem;
  }
  #drop-zone:hover, #drop-zone.dragover { border-color: #2563eb; background: #0d1829; }
  #drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  #drop-zone p { color: #888; font-size: 0.9rem; }
  #drop-zone p strong { color: #ccc; }
  #file-input { display: none; }

  /* ─── QR display ─── */
  #qr-section { display: none; flex-direction: column; align-items: center; gap: 1.25rem; }

  .file-info {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 0.75rem 1.25rem;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.85rem;
    color: #aaa;
  }
  .file-info .name { color: #e8e8e8; font-weight: 600; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #qr-wrap {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #qr-canvas { display: block; }

  .chunk-info {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .chunk-sub { font-size: 0.8rem; color: #666; margin-top: 2px; }

  /* progress bar */
  .progress-track {
    width: 100%;
    height: 6px;
    background: #2a2a2a;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #2563eb;
    border-radius: 99px;
    transition: width 0.15s ease;
  }

  /* controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
  }
  .ctrl-btn {
    background: #1e1e1e;
    border: 1px solid #333;
    color: #e8e8e8;
    border-radius: 10px;
    padding: 0.6rem 1rem;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: #2a2a2a; }
  .ctrl-btn.active { background: #2563eb; border-color: #2563eb; }

  .speed-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .speed-label { font-size: 0.75rem; color: #666; text-align: right; }
  input[type=range] {
    width: 100%;
    accent-color: #2563eb;
    cursor: pointer;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    border-radius: 10px;
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 0.5rem;
    width: 100%;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: #555; color: #ccc; }

  /* loading */
  #loading { display: none; text-align: center; padding: 2rem; color: #666; font-size: 0.9rem; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #2a2a2a;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 0.75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error-msg { display: none; color: #f87171; background: #1f0f0f; border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.9rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<header>
  <a href="/">← ホーム</a>
  <h1>📤 送信</h1>
</header>
<main>
  <div id="error-msg"></div>

  <div id="drop-zone">
    <div class="icon">📁</div>
    <p><strong>クリックまたはドラッグ&ドロップ</strong></p>
    <p style="margin-top:0.35rem">最大 3MB まで対応</p>
    <input type="file" id="file-input">
  </div>

  <div id="loading">
    <div class="spinner"></div>
    QRコードを生成中...
  </div>

  <div id="qr-section">
    <div class="file-info">
      <span class="name" id="info-name">—</span>
      <span id="info-size">—</span>
    </div>

    <div id="qr-wrap">
      <canvas id="qr-canvas"></canvas>
    </div>

    <div>
      <div class="chunk-info" id="chunk-counter">0 / 0</div>
      <div class="chunk-sub">チャンク (連続ループ中)</div>
    </div>

    <div class="progress-track" style="width:100%">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-prev" title="前へ">⏮</button>
      <button class="ctrl-btn active" id="btn-play" title="再生/一時停止">⏸</button>
      <button class="ctrl-btn" id="btn-next" title="次へ">⏭</button>
      <div class="speed-wrap">
        <input type="range" id="speed-slider" min="100" max="1200" step="50" value="300">
        <div class="speed-label" id="speed-label">300 ms / フレーム</div>
      </div>
    </div>

    <button class="reset-btn" id="btn-reset">別のファイルを選択</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const loadingEl  = document.getElementById('loading');
const qrSection  = document.getElementById('qr-section');
const errorMsg   = document.getElementById('error-msg');
const qrCanvas   = document.getElementById('qr-canvas');
const counter    = document.getElementById('chunk-counter');
const progressEl = document.getElementById('progress-fill');
const btnPlay    = document.getElementById('btn-play');
const btnPrev    = document.getElementById('btn-prev');
const btnNext    = document.getElementById('btn-next');
const btnReset   = document.getElementById('btn-reset');
const speedSlider= document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const infoName   = document.getElementById('info-name');
const infoSize   = document.getElementById('info-size');

let chunks  = [];
let idx     = 0;
let playing = false;
let timer   = null;
let speed   = 300;

// ─── File handling ───────────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

async function loadFile(file) {
  showError('');
  dropZone.style.display = 'none';
  loadingEl.style.display = 'block';

  const fd = new FormData();
  fd.append('file', file);

  let data;
  try {
    const res = await fetch('/api/prepare', { method: 'POST', body: fd });
    data = await res.json();
  } catch (e) {
    loadingEl.style.display = 'none';
    dropZone.style.display = '';
    showError('通信エラー: ' + e.message);
    return;
  }

  if (data.error) {
    loadingEl.style.display = 'none';
    dropZone.style.display = '';
    showError(data.error);
    return;
  }

  chunks = data.chunks;
  infoName.textContent = data.filename;
  infoSize.textContent = formatBytes(data.filesize) + '  (' + data.total + ' チャンク)';
  idx = 0;

  loadingEl.style.display = 'none';
  qrSection.style.display = 'flex';

  playing = true;
  btnPlay.textContent = '⏸';
  btnPlay.classList.add('active');
  await renderCurrent();
  scheduleNext();
}

// ─── QR rendering ────────────────────────────────────────────────
async function renderCurrent() {
  const n = chunks.length;
  counter.textContent = `${idx + 1} / ${n}`;
  progressEl.style.width = `${((idx + 1) / n) * 100}%`;

  await QRCode.toCanvas(qrCanvas, chunks[idx], {
    errorCorrectionLevel: 'L',
    margin: 1,
    width: 380,
    color: { dark: '#000000', light: '#ffffff' }
  });
}

function scheduleNext() {
  clearTimeout(timer);
  if (!playing) return;
  timer = setTimeout(async () => {
    idx = (idx + 1) % chunks.length;
    await renderCurrent();
    scheduleNext();
  }, speed);
}

// ─── Controls ────────────────────────────────────────────────────
btnPlay.addEventListener('click', () => {
  playing = !playing;
  btnPlay.textContent = playing ? '⏸' : '▶️';
  if (playing) { btnPlay.classList.add('active'); scheduleNext(); }
  else { btnPlay.classList.remove('active'); clearTimeout(timer); }
});

btnPrev.addEventListener('click', async () => {
  clearTimeout(timer);
  idx = (idx - 1 + chunks.length) % chunks.length;
  await renderCurrent();
  if (playing) scheduleNext();
});

btnNext.addEventListener('click', async () => {
  clearTimeout(timer);
  idx = (idx + 1) % chunks.length;
  await renderCurrent();
  if (playing) scheduleNext();
});

speedSlider.addEventListener('input', () => {
  speed = parseInt(speedSlider.value);
  speedLabel.textContent = speed + ' ms / フレーム';
  if (playing) { clearTimeout(timer); scheduleNext(); }
});

btnReset.addEventListener('click', () => {
  clearTimeout(timer);
  playing = false;
  chunks = [];
  idx = 0;
  fileInput.value = '';
  qrSection.style.display = 'none';
  dropZone.style.display = '';
  progressEl.style.width = '0%';
});

// ─── Helpers ─────────────────────────────────────────────────────
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}
function showError(msg) {
  errorMsg.style.display = msg ? 'block' : 'none';
  errorMsg.textContent = msg;
}
</script>
</body>
</html>
